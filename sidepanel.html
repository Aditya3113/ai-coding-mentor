<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prep Mentor Dashboard</title>
  <style>
    :root {
      --bg: #1a1a1a;
      --panel-bg: #1a1a1a;
      --inset-bg: #262626;
      --border: #3e3e42;
      --text-main: #eff1f6;
      --text-muted: #8a8a8a;
      --accent: #2cbb5d;
      --paywall: #ffa116;
      --paywall-bg: rgba(255, 161, 22, 0.1);
      --hover-bg: rgba(255, 255, 255, 0.04);
      --diff-easy: #2cbb5d;
      --diff-medium: #ffa116;
      --diff-hard: #ef4743;
    }

    * { box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: var(--bg);
      color: var(--text-main);
      font-size: 14px;
      line-height: 1.5;
    }

    /* Header */
    .header {
      padding: 12px 20px;
      background-color: var(--bg);
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .header-title-group {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .problem-title {
      font-weight: 600;
      font-size: 15px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .difficulty-badge {
      font-size: 12px;
      font-weight: 500;
      padding: 1px 6px;
      border-radius: 10px;
      flex-shrink: 0;
    }
    .difficulty-badge.Easy   { color: var(--diff-easy);   background: rgba(44,187,93,0.1); }
    .difficulty-badge.Medium { color: var(--diff-medium);  background: rgba(255,161,22,0.1); }
    .difficulty-badge.Hard   { color: var(--diff-hard);   background: rgba(239,71,67,0.1); }

    .timer {
      color: #ef4743;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      display: none;
      flex-shrink: 0;
    }

    /* Accordion */
    .accordion-item {
      background-color: var(--panel-bg);
      border-bottom: 1px solid var(--border);
    }

    .accordion-header {
      padding: 14px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      user-select: none;
      transition: background-color 0.15s ease;
    }
    .accordion-header:hover { background-color: var(--hover-bg); }

    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--text-muted);
      font-weight: 500;
      font-size: 15px;
      transition: color 0.15s ease;
    }
    .accordion-header:hover .header-left,
    .accordion-item.active .header-left { color: var(--text-main); }

    .header-icon {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      stroke: currentColor;
    }

    /* Companies always orange */
    .accordion-item.locked .header-left,
    .accordion-item.locked.active .header-left,
    .accordion-item.locked .accordion-header:hover .header-left { color: var(--paywall); }

    .hint-count-badge {
      font-size: 12px;
      color: var(--text-muted);
      margin-left: 2px;
    }

    .chevron {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      stroke: var(--text-muted);
      transition: transform 0.25s ease;
    }
    .accordion-item.active .chevron {
      transform: rotate(180deg);
      stroke: var(--text-main);
    }

    .accordion-content {
      display: none;
      padding: 0 20px 16px 20px;
    }
    .accordion-item.active .accordion-content { display: block; }

    /* Target Trackers */
    .metrics { display: flex; gap: 8px; margin-top: 4px; }
    .metric-box {
      flex: 1; background: var(--inset-bg); padding: 8px 10px;
      border-radius: 4px; border: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center;
    }
    .metric-label { font-size: 12px; color: var(--text-muted); }
    .metric-val { font-size: 13px; font-weight: 600; font-family: monospace; color: var(--accent); }

    /* Companies Tags */
    .tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
    .tag-free {
      background: var(--inset-bg); border: 1px solid var(--border);
      color: var(--text-main); padding: 2px 8px; border-radius: 12px; font-size: 12px;
    }
    .tag-locked {
      background: var(--paywall-bg); color: var(--paywall); border: 1px solid var(--paywall);
      padding: 2px 8px; border-radius: 12px; font-size: 12px; font-weight: 500;
      cursor: pointer; display: flex; align-items: center; gap: 4px;
    }
    .tag-locked:hover { background: var(--paywall); color: #000; }
    .tag-locked svg { width: 10px; height: 10px; }

    /* NEW: Sleek Hoverable List Items */
    .list-item-card {
      background: var(--inset-bg);
      border: 1px solid var(--border);
      border-left: 3px solid transparent; /* Used for hover effect */
      border-radius: 6px;
      padding: 10px 12px;
      margin-bottom: 8px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      transition: transform 0.25s ease, border-color 0.25s ease, background-color 0.25s ease;
    }
    .list-item-card:last-child {
      margin-bottom: 0;
    }
    /* The Hover Effect */
    .list-item-card:hover {
      transform: translateX(4px); /* Smooth slide to the right */
      border-color: var(--border);
      border-left-color: var(--accent); /* Highlight the left edge */
      background: var(--hover-bg);
    }
    .item-number {
      color: var(--text-muted);
      font-weight: 600;
      font-size: 12px;
      background: rgba(255, 255, 255, 0.05);
      padding: 2px 6px;
      border-radius: 4px;
      flex-shrink: 0;
    }
    .item-text {
      color: var(--text-main);
      font-size: 13px;
      line-height: 1.5;
    }

    #idleState { text-align: center; padding: 30px 20px; color: var(--text-muted); font-size: 13px; }
    #dashboardState { display: none; flex-direction: column; }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-title-group">
      <span class="problem-title" id="headerTitle">Prep Dashboard</span>
      <span class="difficulty-badge" id="difficultyBadge" style="display:none"></span>
    </div>
    <div class="timer" id="pressureTimer">00:00</div>
  </div>

  <div id="idleState">
    <p>Waiting for LeetCode problem...</p>
  </div>

  <div id="dashboardState">

    <!-- Companies (top, open by default, locked) -->
    <div class="accordion-item locked active">
      <div class="accordion-header">
        <div class="header-left">
          <svg class="header-icon" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
          <span>Companies</span>
        </div>
        <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
      </div>
      <div class="accordion-content">
        <div class="tags" id="companyTags"></div>
      </div>
    </div>

    <!-- Optimal Targets (closed by default) -->
    <div class="accordion-item">
      <div class="accordion-header">
        <div class="header-left">
          <svg class="header-icon" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>
          <span>Optimal Targets</span>
        </div>
        <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
      </div>
      <div class="accordion-content">
        <div class="metrics">
          <div class="metric-box">
            <span class="metric-label">Time</span>
            <span class="metric-val" id="targetTime">O(?)</span>
          </div>
          <div class="metric-box">
            <span class="metric-label">Space</span>
            <span class="metric-val" id="targetSpace">O(?)</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Hints -->
    <div class="accordion-item">
      <div class="accordion-header">
        <div class="header-left">
          <svg class="header-icon" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18h6"></path><path d="M10 22h4"></path><path d="M15.09 14c.18-.98.65-1.74 1.41-2.5A4.65 4.65 0 0 0 18 8 6 6 0 0 0 6 8c0 1 .23 2.07 1.5 3.5.76.76 1.21 1.5 1.41 2.5"></path></svg>
          <span>Hints</span>
          <span class="hint-count-badge" id="hintCount">0</span>
        </div>
        <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
      </div>
      <div class="accordion-content">
        <div id="hintsContainer"></div>
      </div>
    </div>

    <!-- Edge Cases -->
    <div class="accordion-item">
      <div class="accordion-header">
        <div class="header-left">
          <svg class="header-icon" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
          <span>Edge Cases</span>
          <span class="hint-count-badge" id="edgeCaseCount">0</span>
        </div>
        <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
      </div>
      <div class="accordion-content">
        <div id="edgeCasesContainer"></div>
      </div>
    </div>

  </div>

  <script src="database.js"></script>
  <script src="sidepanel.js"></script>
</body>
</html>
