<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Mentor</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f8f9fa;
      color: #24292e;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    .header {
      padding: 16px;
      background-color: #ffffff;
      border-bottom: 1px solid #e1e4e8;
      font-weight: 600;
      font-size: 15px;
      letter-spacing: -0.2px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .chat-container {
      flex: 1;
      padding: 16px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .message {
      padding: 12px 16px;
      border-radius: 6px;
      font-size: 14px;
      line-height: 1.5;
      max-width: 85%;
      word-wrap: break-word;
    }
    .system-message {
      background-color: #e1f0fe;
      color: #0366d6;
      border: 1px solid #c8e1ff;
      align-self: flex-start;
      border-bottom-left-radius: 2px;
    }
    .user-message {
      background-color: #24292e;
      color: #ffffff;
      align-self: flex-end;
      border-bottom-right-radius: 2px;
    }
    .input-area {
      padding: 16px;
      background-color: #ffffff;
      border-top: 1px solid #e1e4e8;
      display: flex;
      gap: 8px;
    }
    input[type="text"] {
      flex: 1;
      padding: 8px 12px;
      border: 1px solid #d1d5da;
      border-radius: 6px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input[type="text"]:focus {
      border-color: #0366d6;
      box-shadow: 0 0 0 3px rgba(3, 102, 214, 0.3);
    }
    button {
      padding: 8px 16px;
      background-color: #24292e;
      color: #ffffff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    button:hover {
      background-color: #1b1f23;
    }
    button:disabled {
      background-color: #6a737d;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <div class="header">
    <span>Session Workspace</span>
    <span id="statusIndicator" style="font-size: 12px; color: #6a737d;">Idle</span>
  </div>
  
  <div class="chat-container" id="chatContainer">
    <div class="message system-message">
      Waiting for problem context... Open LeetCode to begin.
    </div>
  </div>
  
  <div class="input-area">
    <input type="text" id="userInput" placeholder="Ask your mentor..." autocomplete="off">
    <button id="sendBtn">Send</button>
  </div>

  <script src="sidepanel.js"></script> 
</body>
</html>
